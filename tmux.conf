# ============================================================
#  Gotham Dark Knight tmux config
#  Prefix: Ctrl-a   |   Which-key: prefix + Space
#  Vi navigation. No memorization. Pure muscle.
# ============================================================

# --- Plugin Manager (must be at bottom of config) -------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'alexwforsythe/tmux-which-key'
set -g @plugin 'christoomey/vim-tmux-navigator'

# tmux-which-key: use XDG paths so config survives plugin updates
set -g @tmux-which-key-xdg-enable 1

# --- General --------------------------------------------------
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-ghostty:Tc"
set -ga terminal-overrides ",*256col*:Tc"   # true color
set-option -g mouse on
set-option -g focus-events on
set-option -g history-limit 50000
set-option -g renumber-windows on
set-option -g set-titles on
set-option -g set-titles-string "#S / #W"

# --- Prefix ---------------------------------------------------
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- Vi Copy Mode --------------------------------------------
set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
unbind -T copy-mode-vi MouseDragEnd1Pane

# --- Splitting Panes ------------------------------------------
bind "|" split-window -h -c "#{pane_current_path}"
bind "-" split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# --- Vim-Style Pane Navigation (prefix + h/j/k/l) -------------
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- Alt+hjkl Pane Navigation (no prefix needed) --------------
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# --- Vim-Style Pane Resizing (prefix + H/J/K/L) ---------------
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Window Navigation ----------------------------------------
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# --- Convenience ----------------------------------------------
bind r source-file ~/.tmux.conf \; display "Config reloaded"
bind x kill-pane
bind X kill-window
bind z resize-pane -Z
bind Tab last-window

# --- Beautiful Rounded Status Bar (Kanagawa) ------------------
set -g status-position bottom
set -g status-interval 1
set -g status-justify left
set -g status-left-length 80
set -g status-right-length 120

# Palette
ink0="#16161d"
ink1="#1f1f28"
ink2="#2a2a37"
ink3="#363646"
ink4="#54546d"
wave1="#223249"
fuji="#dcd7ba"
oldWhite="#c8c093"
springBlue="#7fb4ca"
springViolet="#957fb8"
autumnRed="#c34043"
autumnGreen="#76946a"
carpYellow="#e6c384"
crystalBlue="#7e9cd8"
surimi="#ffa066"

set -g status-style "bg=$ink1,fg=$fuji"

# Left: Session pill (spring violet)
set -g status-left "#[bg=$springViolet,fg=$ink1,bold]  #S  #[bg=$ink1] "

# Center: Window pills
setw -g window-status-format "#[bg=$ink3,fg=$oldWhite]  #I #W  "
setw -g window-status-current-format "#[bg=$autumnRed,fg=$fuji,bold]  #I #W  "
setw -g window-status-separator " "

# Right: Prefix pill (carp yellow) | Which-key pill (surimi) | Time pill (spring blue) | Date pill (autumn green)
set -g status-right "#[bg=$carpYellow,fg=$ink1,bold]  #(tmux show -g prefix | awk '{print $2}')  #[bg=$surimi,fg=$ink1,bold]  C-Space  #[bg=$springBlue,fg=$ink1,bold]  %H:%M  #[bg=$autumnGreen,fg=$ink1,bold]  %d %b  #[bg=$ink1]"

# --- Colors ---------------------------------------------------
set -g pane-border-style "fg=$ink4"
set -g pane-active-border-style "fg=$crystalBlue"
set -g message-style "bg=$ink2,fg=$fuji,bold"

# --- TPM (keep at bottom) -------------------------------------
run '~/.tmux/plugins/tpm/tpm'
