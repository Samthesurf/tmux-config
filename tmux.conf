# ============================================================
#  Gotham Dark Knight tmux config
#  Prefix: Ctrl-a   |   Which-key: prefix + Space
#  Vi navigation. No memorization. Pure muscle.
# ============================================================

# --- Plugin Manager (must be at bottom of config) -------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'alexwforsythe/tmux-which-key'
set -g @plugin 'christoomey/vim-tmux-navigator'

# tmux-which-key: use XDG paths so config survives plugin updates
set -g @tmux-which-key-xdg-enable 1

# --- General --------------------------------------------------
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-ghostty:Tc"
set -ga terminal-overrides ",*256col*:Tc"   # true color
set-option -g mouse on
set-option -g focus-events on
set-option -g history-limit 50000
set-option -g renumber-windows on
set-option -g set-titles on
set-option -g set-titles-string "#S / #W"

# --- Prefix ---------------------------------------------------
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- Vi Copy Mode --------------------------------------------
set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
unbind -T copy-mode-vi MouseDragEnd1Pane

# --- Splitting Panes ------------------------------------------
bind "|" split-window -h -c "#{pane_current_path}"
bind "-" split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# --- Vim-Style Pane Navigation (prefix + h/j/k/l) -------------
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- Alt+hjkl Pane Navigation (no prefix needed) --------------
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# --- Vim-Style Pane Resizing (prefix + H/J/K/L) ---------------
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Window Navigation ----------------------------------------
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# --- Convenience ----------------------------------------------
bind r source-file ~/.tmux.conf \; display "Config reloaded"
bind x kill-pane
bind X kill-window
bind z resize-pane -Z
bind Tab last-window

# --- Status Bar -----------------------------------------------
set -g status-position bottom
set -g status-interval 5
set -g status-justify left
set -g status-left-length 40
set -g status-right-length 100

# Left: session name
set -g status-left "#[fg=colour15,bg=colour237,bold] #S #[default]"

# Center: window list
setw -g window-status-format "#[fg=colour245] #I #W "
setw -g window-status-current-format "#[fg=colour15,bg=colour240,bold] #I #W "
setw -g window-status-separator ""

# Right: hostname + date/time
set -g status-right "#[fg=colour245]%H:%M:%S  %d-%b  #(hostname -s) "

# --- Colors ---------------------------------------------------
set -g status-style "bg=colour234,fg=colour250"
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour39"
set -g message-style "bg=colour237,fg=colour15"

# --- TPM (keep at bottom) -------------------------------------
run '~/.tmux/plugins/tpm/tpm'
